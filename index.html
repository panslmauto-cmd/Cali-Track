<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CALI">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c0c14">
<title>Calisthenics Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0c14;--s1:#13131e;--s2:#1a1a28;--s3:#222233;
  --brd:rgba(255,255,255,.06);--brd2:rgba(255,255,255,.1);
  --tx:#eae8e3;--tx2:#9a96a6;--tx3:#5c586a;
  --ac:#00e5a0;--ac2:#00c48c;--acdim:rgba(0,229,160,.1);--acbrd:rgba(0,229,160,.25);
  --warn:#ffb347;--wdim:rgba(255,179,71,.1);--wbrd:rgba(255,179,71,.2);
  --red:#ff5c6a;--rdim:rgba(255,92,106,.08);
  --f:'Outfit',sans-serif;--m:'JetBrains Mono',monospace;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:var(--f);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{padding-top:var(--sat);padding-bottom:calc(64px + var(--sab))}
button{font-family:var(--f);cursor:pointer;border:none;background:none;color:inherit}
input,textarea{font-family:var(--f);outline:none}
.wrap{max-width:500px;margin:0 auto;padding:0 16px}

/* Header */
.hdr{background:linear-gradient(160deg,#0f1120,#151528,#0f1120);border-bottom:1px solid var(--brd);padding:calc(14px + var(--sat)) 0 12px;position:sticky;top:0;z-index:50}
.hdr-inner{display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-family:var(--m);font-size:18px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(90deg,var(--ac),#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{font-size:10px;color:var(--tx3);font-family:var(--m);margin-top:1px;letter-spacing:.5px}
.wk-box{background:var(--acdim);border:1px solid var(--acbrd);border-radius:10px;padding:6px 12px;text-align:center;display:flex;align-items:center;gap:8px}
.wk-box .lbl{font-size:9px;color:var(--ac);font-family:var(--m);letter-spacing:1px}
.wk-box .num{font-size:22px;font-weight:800;font-family:var(--m);color:#fff;min-width:24px;text-align:center}
.wk-btn{font-size:16px;color:var(--ac);padding:4px;line-height:1}
.pbar{margin-top:10px;height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--ac),#00d4ff);border-radius:2px;transition:width .4s}
.pbar-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--tx3);font-family:var(--m);margin-top:4px;letter-spacing:.5px}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(12,12,20,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--brd);display:flex;justify-content:space-around;padding:4px 0 calc(4px + var(--sab));z-index:100}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;padding:8px 6px;border-radius:10px;font-size:9px;font-weight:600;letter-spacing:.3px;color:var(--tx3);transition:color .2s;min-width:56px}
.nb.on{color:var(--ac)}
.nb .ico{font-size:20px;line-height:1}

/* Cards */
.card{background:var(--s1);border:1px solid var(--brd);border-radius:14px;overflow:hidden;margin-bottom:8px}
.card:active{transform:scale(.985);transition:transform .1s}

/* Phase pills */
.pills{display:flex;gap:6px;margin-bottom:12px}
.pill{flex:1;padding:10px 6px;border-radius:10px;background:rgba(255,255,255,.02);border:1px solid var(--brd);text-align:center;transition:all .2s}
.pill.on{background:var(--acdim);border-color:var(--acbrd)}
.pill .pn{font-size:11px;font-weight:700;font-family:var(--m);color:var(--tx3);letter-spacing:.5px}
.pill.on .pn{color:var(--ac)}
.pill .pw{font-size:9px;color:var(--tx3);margin-top:2px;opacity:.7}

/* Day tabs */
.dtabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
.dtabs::-webkit-scrollbar{display:none}
.dtab{flex-shrink:0;padding:8px 12px;border-radius:8px;font-size:11px;font-weight:600;color:var(--tx3);background:rgba(255,255,255,.02);border:1px solid var(--brd);white-space:nowrap}
.dtab.on{color:var(--tx);background:var(--acdim);border-color:var(--acbrd)}

/* Exercise rows */
.exr{display:flex;align-items:center;gap:12px;padding:13px 14px}
.eck{width:24px;height:24px;border-radius:8px;flex-shrink:0;border:2px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;transition:all .15s}
.eck.dn{background:linear-gradient(135deg,var(--ac),var(--ac2));border-color:transparent;color:var(--bg)}
.exn{font-size:14px;font-weight:600;line-height:1.3}
.exn.dn{text-decoration:line-through;opacity:.45}
.exm{font-size:11px;color:var(--ac);font-family:var(--m);margin-top:2px}
.exd{padding:0 14px 13px;border-top:1px solid rgba(255,255,255,.03)}
.exd p{font-size:12px;line-height:1.6;color:var(--tx2);padding-top:10px}
.exd strong{color:var(--tx)}
.exd .prog{color:var(--ac2);margin-top:6px}
.yt-link{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:5px 10px;background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.15);border-radius:6px;font-size:11px;font-weight:600;color:#ff4444;text-decoration:none;transition:background .2s}
.yt-link:active{background:rgba(255,0,0,.15)}

/* Progress circle */
.pcircle{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--acdim);border:1px solid rgba(0,229,160,.12);border-radius:10px;margin-bottom:12px}
.pcnum{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;font-family:var(--m)}

/* Meal cards */
.meal-hdr{display:flex;align-items:center;gap:12px;padding:13px 14px;cursor:pointer}
.meal-ico{width:36px;height:36px;border-radius:10px;background:var(--acdim);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.meal-opts{padding:0 14px 12px;border-top:1px solid rgba(255,255,255,.03)}
.meal-opt{font-size:13px;color:#ccc;line-height:1.6;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.meal-opt:last-child{border:none}

/* Cholesterol box */
.chol{background:var(--wdim);border:1px solid var(--wbrd);border-radius:14px;padding:16px;margin-top:18px}
.chol h4{font-size:12px;font-family:var(--m);color:var(--warn);margin-bottom:10px;letter-spacing:.5px}
.chol .tip{font-size:12px;color:#ccc;line-height:1.8;padding:2px 0}
.chol .tip::before{content:'→';color:var(--warn);margin-right:8px}
.chol .note{margin-top:10px;padding:10px;background:rgba(255,179,71,.06);border-radius:8px;font-size:11px;color:var(--tx2);line-height:1.5}
.chol .note b{color:var(--warn)}

/* Milestones */
.mrow{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.03);border-radius:10px;margin-bottom:6px;transition:all .2s}
.mrow.done{background:var(--acdim);border-color:rgba(0,229,160,.15)}
.mrow.locked{opacity:.35}
.mchk{width:28px;height:28px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.04);border:2px solid var(--brd2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.mchk.dn{background:linear-gradient(135deg,var(--ac),var(--ac2));border-color:transparent;color:var(--bg);font-weight:700}
.mgoal{font-size:13px;font-weight:600}
.mgoal.dn{text-decoration:line-through;opacity:.6}
.mwk{font-size:10px;color:var(--tx3);font-family:var(--m)}

/* Body log */
.blog-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.blog-grid label{font-size:11px;color:var(--tx3);display:block;margin-bottom:3px}
.blog-grid input{width:100%;background:rgba(0,0,0,.3);border:1px solid var(--brd2);border-radius:8px;color:#fff;padding:9px 10px;font-size:13px;font-family:var(--m)}
.blog-btn{width:100%;padding:10px;background:var(--acdim);border:1px solid var(--acbrd);border-radius:8px;color:var(--ac);font-size:13px;font-weight:700}
.blog-tbl{width:100%;font-size:11px;border-collapse:collapse;margin-top:12px}
.blog-tbl th{text-align:left;padding:6px 6px;color:var(--tx3);font-family:var(--m);font-size:9px;letter-spacing:.5px;border-bottom:1px solid var(--brd)}
.blog-tbl td{padding:6px;border-bottom:1px solid rgba(255,255,255,.02);font-family:var(--m);font-size:11px}
.blog-tbl .r{text-align:right}

/* Journal */
.jtxt{width:100%;resize:vertical;background:rgba(0,0,0,.3);border:1px solid var(--brd2);border-radius:10px;color:var(--tx);padding:12px;font-size:13px;line-height:1.6;min-height:80px}
.jmoods{display:flex;gap:4px}
.jmood{font-size:22px;padding:4px 8px;border-radius:8px;background:transparent;border:1px solid transparent;transition:all .15s}
.jmood.on{background:var(--acdim);border-color:var(--acbrd)}
.jentry{background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.04);border-radius:12px;padding:12px 14px;margin-bottom:8px}
.jmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:11px;color:var(--tx3);font-family:var(--m)}

/* Weekly Summary */
.stat-card{background:var(--s1);border:1px solid var(--brd);border-radius:14px;padding:16px;margin-bottom:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--brd)}
.stat-row:last-child{border:none}
.stat-label{font-size:13px;color:var(--tx2)}
.stat-val{font-size:16px;font-weight:700;font-family:var(--m);color:var(--ac)}
.streak-num{font-size:48px;font-weight:800;font-family:var(--m);background:linear-gradient(135deg,var(--ac),#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;text-align:center;margin:12px 0 4px}
.streak-label{text-align:center;font-size:12px;color:var(--tx3)}

/* Section titles */
.stitle{font-size:13px;font-weight:700;font-family:var(--m);color:var(--ac);letter-spacing:.5px;margin-bottom:10px}
.stitle2{font-size:12px;font-weight:700;font-family:var(--m);color:var(--tx2);letter-spacing:.5px;margin:20px 0 10px}
.desc{font-size:13px;color:var(--tx2);line-height:1.5;margin-bottom:14px}

/* Protein target box */
.ptarget{background:linear-gradient(135deg,var(--acdim),rgba(0,212,255,.06));border:1px solid var(--acbrd);border-radius:14px;padding:16px;margin-bottom:16px}
.ptarget .lbl{font-size:10px;color:var(--ac);font-family:var(--m);letter-spacing:1px;margin-bottom:6px}
.ptarget .big{font-size:24px;font-weight:800;font-family:var(--m)}
.ptarget .sm{font-size:11px;color:var(--tx3);margin-top:2px}
.pt-row{display:flex;gap:16px;flex-wrap:wrap}
.pt-calc{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx2)}
.pt-calc input{width:56px;background:rgba(0,0,0,.3);border:1px solid var(--brd2);border-radius:6px;color:#fff;padding:5px 8px;font-size:13px;font-family:var(--m);text-align:center}
.pt-calc .res{color:var(--ac);font-weight:600}

/* Reset btn */
.rst{display:block;margin:30px auto 10px;padding:8px 16px;background:var(--rdim);border:1px solid rgba(255,92,106,.12);border-radius:6px;color:var(--red);font-size:11px;opacity:.5}
.rst:active{opacity:1}

/* Tabs in content area */
.content{padding:14px 0 80px}

/* Arrow */
.arr{font-size:11px;color:var(--tx3);transition:transform .2s;margin-left:auto;flex-shrink:0}
.arr.open{transform:rotate(180deg)}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeIn .25s ease}
</style>
</head>

  }catch(e){}

function save(){

// ──── RENDER ────
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="on"&&typeof v==="object")Object.entries(v).forEach(([ev,fn])=>el.addEventListener(ev,fn));
    else if(k==="className")el.className=v;
    else if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k==="innerHTML")el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  ch.flat(Infinity).forEach(c=>{if(c!=null)el.append(typeof c==="string"?document.createTextNode(c):c)});
  return el;
}

function render(){
  const app=document.getElementById("app");
  app.innerHTML="";
  app.append(renderHeader(),renderContent(),renderNav());
}

function renderHeader(){
  const pct=((S.week)/24*100).toFixed(1);

        h("div",{className:"wk-box"},

          h("button",{className:"wk-btn",on:{click:()=>{S.week=Math.max(1,S.week-1);save();render()}}},"◀"),
          h("div",{className:"num"},String(S.week)),
          h("button",{className:"wk-btn",on:{click:()=>{S.week=Math.min(24,S.week+1);save();render()}}},"▶")
        )
      ),
      h("div",{className:"pbar"},h("div",{className:"pbar-fill",style:{width:pct+"%"}})),
      h("div",{className:"pbar-labels"},h("span",null,"FOUNDATION"),h("span",null,"BUILDING"),h("span",null,"ADVANCED"))
    )
  );
}

function renderContent(){

  else if(S.tab==="summary")wrap.append(...renderSummary());
  else if(S.tab==="progress")wrap.append(...renderProgress());
  else if(S.tab==="journal")wrap.append(...renderJournal());
  return wrap;
}

// ──── WORKOUT TAB ────
function renderWorkout(){
  const P=PHASES[S.phase];const D=P.days[S.day];
  const total=D.exercises.length;
  const doneCount=D.exercises.filter((_,i)=>S.done[`${S.phase}-${S.day}-${i}`]).length;
  const allDone=doneCount===total;

  return [
    // Phase pills
    h("div",{className:"pills"},
      ...PHASES.map((p,i)=>h("button",{className:"pill"+(S.phase===i?" on":""),on:{click:()=>{S.phase=i;S.day=0;S.expanded=null;render()}}},
        h("div",{className:"pn"},p.name.toUpperCase()),
        h("div",{className:"pw"},p.weeks)
      ))
    ),
    h("p",{className:"desc"},P.desc),
    // Day tabs
    h("div",{className:"dtabs"},
      ...P.days.map((d,i)=>h("button",{className:"dtab"+(S.day===i?" on":""),on:{click:()=>{S.day=i;S.expanded=null;render()}}},d.short))
    ),
    // Progress
    h("div",{className:"pcircle"},
      h("div",{className:"pcnum",style:{background:allDone?"linear-gradient(135deg,var(--ac),var(--ac2))":"rgba(255,255,255,.05)",color:allDone?"var(--bg)":"var(--tx)"}},
        allDone?"✓":String(doneCount)
      ),
      h("div",null,
        h("div",{style:{fontSize:"13px",fontWeight:"600"}},allDone?"Workout Complete!":doneCount+" of "+total+" done"),
        h("div",{style:{fontSize:"11px",color:"var(--tx3)",marginTop:"1px"}},"Tap exercise to see details")
      )
    ),
    // Exercises
    ...D.exercises.map((ex,i)=>{
      const key=`${S.phase}-${S.day}-${i}`;
      const isDone=!!S.done[key];
      const isExp=S.expanded===key;
      const card=h("div",{className:"card"});
      const row=h("div",{className:"exr",on:{click:()=>{S.expanded=isExp?null:key;render()}}},
        h("button",{className:"eck"+(isDone?" dn":""),on:{click:(e)=>{
          e.stopPropagation();
          S.done[key]=!S.done[key];
          if(S.done[key]&&!S.workoutLog)S.workoutLog=[];
          if(S.done[key])S.workoutLog.push(Date.now());
          save();render();
        }}},isDone?"✓":""),
        h("div",{style:{flex:"1"}},
          h("div",{className:"exn"+(isDone?" dn":"")},ex.n),
          h("div",{className:"exm"},ex.s+" · Rest "+ex.r)
        ),
        h("span",{className:"arr"+(isExp?" open":"")},"\u25BC")
      );
      card.append(row);
      if(isExp){
        const det=h("div",{className:"exd"},
          h("p",null,h("strong",null,"Form: "),ex.note),
          h("p",{className:"prog"},h("strong",{style:{color:"var(--ac)"}},"Next: "),ex.prog),
          h("a",{className:"yt-link",href:"https://www.youtube.com/results?search_query="+encodeURIComponent(ex.yt),target:"_blank",rel:"noopener"},
            "▶ Watch Tutorial"
          )
        );
        card.append(det);
      }
      return card;
    })
  ];
}

// ──── WEEKLY SUMMARY TAB ────
function renderSummary(){
  // Calculate stats
  const P=PHASES[S.phase];
  let totalDoneThisWeek=0,totalExercises=0;
  P.days.forEach((d,di)=>{
    d.exercises.forEach((_,ei)=>{
      totalExercises++;
      if(S.done[`${S.phase}-${di}-${ei}`])totalDoneThisWeek++;
    });
  });

  // Overall stats
  let totalDoneAll=Object.values(S.done).filter(Boolean).length;
  let totalMiles=Object.values(S.miles).filter(Boolean).length;
  let journalCount=S.journal.length;
  let measureCount=S.measures.length;

  // Workout streak (days with logged exercises)
  const logDates=new Set((S.workoutLog||[]).map(ts=>new Date(ts).toDateString()));
  let streak=0;
  const today=new Date();
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);
    if(logDates.has(d.toDateString()))streak++;
    else if(i>0)break;
  }

  // Recent measurements comparison
  let weightChange="—",pushupChange="—",lsitChange="—";
  if(S.measures.length>=2){
    const latest=S.measures[0],prev=S.measures[S.measures.length-1];
    if(latest.w&&prev.w){const d=(parseFloat(latest.w)-parseFloat(prev.w)).toFixed(1);weightChange=(d>0?"+":"")+d+"kg";}
    if(latest.pu&&prev.pu){const d=parseInt(latest.pu)-parseInt(prev.pu);pushupChange=(d>0?"+":"")+d;}
    if(latest.ls&&prev.ls){const d=parseInt(latest.ls)-parseInt(prev.ls);lsitChange=(d>0?"+":"")+d+"s";}
  }

  // Average mood
  let avgMood="—";
  if(S.journal.length>0){
    const sum=S.journal.reduce((a,e)=>a+e.mood,0);
    avgMood=MOODS[Math.round(sum/S.journal.length)];
  }

  // Current phase progress
  const phasePct=totalExercises>0?Math.round(totalDoneThisWeek/totalExercises*100):0;

  return [
    h("div",{className:"stitle"},"WEEKLY SUMMARY — WEEK "+S.week),

    // Streak
    h("div",{className:"stat-card",style:{textAlign:"center"}},
      h("div",{className:"streak-num"},String(streak)),
      h("div",{className:"streak-label"},"day workout streak"),
      h("div",{style:{fontSize:"11px",color:"var(--tx3)",marginTop:"4px"}},
        totalDoneAll+" total exercises completed"
      )
    ),

    // Phase progress
    h("div",{className:"stat-card"},
      h("div",{style:{fontSize:"11px",fontFamily:"var(--m)",color:"var(--ac)",letterSpacing:"1px",marginBottom:"8px"}},
        PHASES[S.phase].name.toUpperCase()+" PHASE PROGRESS"
      ),
      h("div",{style:{display:"flex",alignItems:"center",gap:"12px"}},
        h("div",{style:{fontSize:"32px",fontWeight:"800",fontFamily:"var(--m)"}},phasePct+"%"),
        h("div",{style:{flex:"1"}},
          h("div",{style:{height:"6px",background:"rgba(255,255,255,.06)",borderRadius:"3px",overflow:"hidden"}},
            h("div",{style:{height:"100%",width:phasePct+"%",background:"linear-gradient(90deg,var(--ac),#00d4ff)",borderRadius:"3px",transition:"width .4s"}})
          ),
          h("div",{style:{fontSize:"11px",color:"var(--tx3)",marginTop:"4px"}},totalDoneThisWeek+"/"+totalExercises+" exercises checked off")
        )
      )
    ),

    // Key stats grid
    h("div",{className:"stat-card"},
      h("div",{className:"stat-row"},
        h("span",{className:"stat-label"},"Milestones unlocked"),
        h("span",{className:"stat-val"},totalMiles+"/"+MILESTONES.length)
      ),
      h("div",{className:"stat-row"},
        h("span",{className:"stat-label"},"Journal entries"),
        h("span",{className:"stat-val"},String(journalCount))
      ),
      h("div",{className:"stat-row"},
        h("span",{className:"stat-label"},"Body measurements logged"),
        h("span",{className:"stat-val"},String(measureCount))
      ),
      h("div",{className:"stat-row"},
        h("span",{className:"stat-label"},"Average mood"),
        h("span",{className:"stat-val",style:{fontSize:"22px"}},avgMood)
      )
    ),

    // Progress changes
    S.measures.length>=2?
    h("div",{className:"stat-card"},
      h("div",{style:{fontSize:"11px",fontFamily:"var(--m)",color:"var(--ac)",letterSpacing:"1px",marginBottom:"8px"}},"PROGRESS SINCE FIRST LOG"),
      h("div",{className:"stat-row"},
        h("span",{className:"stat-label"},"Weight change"),
        h("span",{className:"stat-val"},weightChange)
      ),
      h("div",{className:"stat-row"},
        h("span",{className:"stat-label"},"Push-ups change"),
        h("span",{className:"stat-val"},pushupChange)
      ),
      h("div",{className:"stat-row"},
        h("span",{className:"stat-label"},"L-Sit hold change"),
        h("span",{className:"stat-val"},lsitChange)
      )
    ):
    h("div",{className:"stat-card",style:{textAlign:"center",padding:"24px",color:"var(--tx3)",fontSize:"13px"}},
      "Log at least 2 body measurements in the Progress tab to see your changes over time."

    // Motivational

  if(S.journal.length===0){
    els.push(h("div",{style:{textAlign:"center",padding:"36px 16px",color:"var(--tx3)"}},
      h("div",{style:{fontSize:"28px",marginBottom:"6px"}},"📝"),
      h("p",{style:{fontSize:"13px"}},"Your journal is empty. Start logging!"),
      h("p",{style:{fontSize:"12px",marginTop:"4px",color:"var(--tx3)"}},"Writing about your wins builds confidence.")
    ));
  }

  S.journal.forEach(e=>{
    els.push(h("div",{className:"jentry"},
      h("div",{className:"jmeta"},
        h("span",null,e.date+" · Week "+e.wk),
        h("span",{style:{fontSize:"18px"}},MOODS[e.mood])
      ),
      h("p",{style:{fontSize:"13px",color:"#ccc",lineHeight:"1.6"}},e.text)
    ));
  });

  // Reset
  els.push(h("button",{className:"rst",on:{click:()=>{
    if(confirm("Reset ALL progress? This cannot be undone.")){
      localStorage.removeItem("cali-tracker-v2");
      S={tab:"workout",phase:0,day:0,expanded:null,mealOpen:null,week:1,weight:"60",done:{},miles:{},journal:[],measures:[],jText:"",jMood:3,mForm:{w:"",waist:"",pu:"",ls:""},workoutLog:[]};
      render();
    }
  }}},"Reset All Progress"));

  return els;
}

// ──── INIT ────
render();
</script>
</body>
</html>
