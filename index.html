<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FORGE — Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07090C;--bg-card:#0D1018;--bg-hover:#131820;
  --border:#1A2030;--border-light:#242E40;
  --text:#DCE4F0;--text-muted:#5C6880;--text-dim:#2A3345;
  --fire:#FF5500;--fire-dim:rgba(255,85,0,0.12);--fire-glow:0 0 20px rgba(255,85,0,0.3);
  --teal:#0FD9A8;--teal-dim:rgba(15,217,168,0.1);
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,0.12);
  --red:#F55;--red-dim:rgba(255,85,85,0.12);
  --nav-h:64px;--safe-bot:env(safe-area-inset-bottom,0px);
  --r:12px;--rs:8px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
#app::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--text-dim) 1px,transparent 1px),linear-gradient(90deg,var(--text-dim) 1px,transparent 1px);background-size:44px 44px;opacity:0.07;pointer-events:none;z-index:0}

/* SCREENS */
.screen{position:absolute;top:0;left:0;right:0;bottom:calc(var(--nav-h) + var(--safe-bot));overflow-y:auto;overflow-x:hidden;padding:0 16px 32px;-webkit-overflow-scrolling:touch;opacity:0;transform:translateY(6px);pointer-events:none;transition:opacity .2s ease,transform .2s ease;z-index:1}
.screen.active{opacity:1;transform:translateY(0);pointer-events:all}
.screen::-webkit-scrollbar{width:3px}.screen::-webkit-scrollbar-track{background:transparent}.screen::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}

/* BOTTOM NAV */
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav-h) + var(--safe-bot));padding-bottom:var(--safe-bot);background:rgba(8,10,15,0.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;height:var(--nav-h);background:none;border:none;cursor:pointer;color:var(--text-muted);transition:color .2s;-webkit-tap-highlight-color:transparent;padding:0}
.nb.active{color:var(--fire)}
.nb svg{width:22px;height:22px;transition:transform .2s}
.nb.active svg{transform:scale(1.1)}
.nb span{font-size:10px;font-weight:500;letter-spacing:.05em;text-transform:uppercase}

/* COMPONENTS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.08em;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.b-fire{background:var(--fire-dim);color:var(--fire);border:1px solid rgba(255,85,0,.25)}
.b-teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(15,217,168,.25)}
.b-amber{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.25)}
.tabs{display:flex;gap:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);padding:4px;margin-bottom:16px}
.tab{flex:1;padding:7px 4px;border:none;border-radius:6px;background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;text-align:center}
.tab.active{background:var(--fire);color:#fff}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border:none;border-radius:var(--rs);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;width:100%}
.btn-fire{background:var(--fire);color:#fff}.btn-fire:active{transform:scale(.98);background:#e04a00}
.btn-teal{background:var(--teal);color:#07090C}.btn-teal:active{transform:scale(.98)}
.btn-sec{background:var(--bg-card);color:var(--text);border:1px solid var(--border-light)}.btn-sec:active{transform:scale(.98)}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(255,85,85,.2)}.btn-danger:active{transform:scale(.98)}
input[type=text],input[type=number],input[type=date]{background:var(--bg);border:1px solid var(--border-light);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;width:100%}
input:focus{outline:none;border-color:var(--teal)}
.divider{height:1px;background:var(--border);margin:12px 0}
.mono{font-family:'JetBrains Mono',monospace}

/* TODAY SCREEN */
.today-top{padding:18px 0 14px;border-bottom:1px solid var(--border);margin-bottom:16px}
.today-day{font-family:'Bebas Neue',sans-serif;font-size:52px;line-height:1;letter-spacing:.03em;background:linear-gradient(135deg,var(--text) 0%,var(--text-muted) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.today-date-str{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted);letter-spacing:.1em;margin-top:2px}
.today-meta{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
.streak-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--fire-dim);border:1px solid rgba(255,85,0,.25);border-radius:20px}
.streak-num{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--fire);line-height:1}
.streak-lbl{font-size:11px;color:var(--fire);font-weight:500;opacity:.85}
.session-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden}
.session-card.done{border-color:rgba(15,217,168,.3)}
.sc-head{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.session-card.done .sc-head{border-bottom-color:rgba(15,217,168,.15)}
.sc-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.06em}
.session-card.done .sc-title{color:var(--teal)}
.sc-prog{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-muted)}
.sc-body{padding:4px 16px 4px}
.ex-item{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent}
.ex-item:last-child{border-bottom:none}
.ex-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--border-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.ex-item.chk .ex-cb{background:var(--teal);border-color:var(--teal)}
.ex-info{flex:1;min-width:0}
.ex-name{font-size:14px;font-weight:500;color:var(--text)}
.ex-item.chk .ex-name{color:var(--text-muted);text-decoration:line-through;text-decoration-color:var(--text-dim)}
.ex-sub{font-size:12px;color:var(--text-muted);margin-top:1px}
.ex-yt{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:rgba(255,0,0,.1);color:#f55;text-decoration:none;flex-shrink:0;font-size:11px;font-weight:700;transition:background .15s}
.ex-yt:hover{background:rgba(255,0,0,.2)}
.sc-foot{padding:12px 16px 14px}
.rest-view{text-align:center;padding:44px 20px}
.rest-icon{font-size:64px;line-height:1;margin-bottom:16px}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.06em;color:var(--amber);margin-bottom:8px}
.rest-desc{color:var(--text-muted);font-size:14px;line-height:1.7}

/* MILESTONE TOAST */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-130px);background:var(--bg-card);border:1px solid var(--fire);border-radius:var(--r);padding:14px 20px;z-index:1000;text-align:center;width:calc(100% - 32px);max-width:448px;transition:transform .4s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--fire-glow)}
#toast.show{transform:translateX(-50%) translateY(0)}
.toast-title{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--fire);letter-spacing:.06em}
.toast-msg{font-size:13px;color:var(--text-muted);margin-top:2px}

/* PLAN SCREEN */
.screen-hdr{padding:16px 0 12px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border);margin-bottom:16px}
.screen-ttl{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.06em}
.phase-sel{display:flex;gap:6px;margin-bottom:16px}
.ph-btn{flex:1;padding:8px 4px;border:1px solid var(--border-light);border-radius:var(--rs);background:var(--bg-card);color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.ph-btn.active{background:var(--fire-dim);border-color:var(--fire);color:var(--fire)}
.plan-item{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-bottom:8px}
.pi-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px}
.pi-name{font-size:15px;font-weight:600}
.pi-sets{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--fire);white-space:nowrap}
.pi-muscles{font-size:12px;color:var(--text-muted);margin-bottom:4px}
.pi-mod{font-size:11px;color:var(--teal);font-style:italic}

/* PROGRESS SCREEN */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:14px;text-align:center}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:42px;line-height:1;letter-spacing:.03em}
.sv-fire{color:var(--fire)}.sv-teal{color:var(--teal)}.sv-amber{color:var(--amber)}
.stat-lbl{font-size:11px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:.06em;margin-top:4px}
.heatmap-month{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.06em;color:var(--text-muted);margin-bottom:10px}
.heatmap-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.hm-lbl{text-align:center;font-size:10px;color:var(--text-dim);font-weight:600;letter-spacing:.05em;padding-bottom:4px}
.hm-day{aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.hm-empty{background:transparent}
.hm-future{background:var(--border);color:var(--text-dim)}
.hm-complete{background:var(--teal);color:#07090C}
.hm-missed{background:rgba(255,85,85,.2);color:var(--red)}
.hm-rest{background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.2)}
.hm-today{box-shadow:0 0 0 2px var(--fire)}
.hm-partial{background:rgba(255,85,0,.2);color:var(--fire)}
.hm-legend{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap}
.hm-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-muted)}
.hm-swatch{width:10px;height:10px;border-radius:2px}
.weight-row{display:flex;gap:8px;margin-bottom:12px}
.weight-row input{flex:1;font-family:'JetBrains Mono',monospace;font-size:16px}
.weight-row button{padding:10px 16px;background:var(--teal);border:none;border-radius:var(--rs);color:#07090C;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:14px;white-space:nowrap}
.prog-bar-wrap{background:var(--border);border-radius:100px;height:8px;margin:8px 0;overflow:hidden}
.prog-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--fire),var(--amber));transition:width .6s cubic-bezier(.34,1.56,.64,1)}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
#weight-canvas{width:100%;display:block;border-radius:var(--rs)}

/* EXERCISES SCREEN */
.cat-hdr{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em;color:var(--fire);padding:12px 0 8px;border-bottom:1px solid var(--fire-dim);margin-bottom:10px}
.ex-ref{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:8px;overflow:hidden}
.er-head{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.er-name{font-size:14px;font-weight:600}
.er-right{display:flex;align-items:center;gap:8px}
.ph-dot{width:8px;height:8px;border-radius:50%}
.ph1{background:var(--teal)}.ph2{background:var(--amber)}.ph3{background:var(--fire)}
.er-body{padding:12px 14px;border-top:1px solid var(--border);display:none}
.er-body.open{display:block}
.er-instructions{font-size:13px;color:var(--text-muted);line-height:1.65;margin-bottom:10px}
.er-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.er-tag{padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500;background:var(--bg);border:1px solid var(--border-light);color:var(--text-muted)}
.er-injury{font-size:12px;margin-bottom:10px}
.inj-safe{color:var(--teal)}.inj-caution{color:var(--amber)}
.yt-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.2);border-radius:var(--rs);color:#f66;text-decoration:none;font-size:12px;font-weight:500;transition:background .15s}
.yt-btn:hover{background:rgba(255,0,0,.18)}
.ex-search{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;width:100%;margin-bottom:12px}
.ex-search:focus{outline:none;border-color:var(--teal)}
.ex-search::placeholder{color:var(--text-muted)}
.filter-tabs{display:flex;gap:4px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px}
.filter-tabs::-webkit-scrollbar{display:none}
.ftab{padding:6px 12px;border:1px solid var(--border-light);border-radius:20px;background:var(--bg-card);color:var(--text-muted);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent}
.ftab.active{background:var(--fire-dim);border-color:var(--fire);color:var(--fire)}

/* SETTINGS SCREEN */
.set-sec{margin-bottom:24px}
.set-sec-ttl{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.08em;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px}
.set-row-lbl{font-size:14px;font-weight:500}
.set-row-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted)}
.about-text{font-size:13px;color:var(--text-muted);line-height:1.75}

/* ANIMATIONS */
@keyframes checkBounce{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes streakPulse{0%{box-shadow:0 0 0 0 rgba(255,85,0,.4)}70%{box-shadow:0 0 0 10px rgba(255,85,0,0)}100%{box-shadow:0 0 0 0 rgba(255,85,0,0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.bounce{animation:checkBounce .3s ease}
.pulse{animation:streakPulse .6s ease-out}
.fade-in{animation:fadeInUp .3s ease forwards}

.chevron{transition:transform .2s;font-size:12px;color:var(--text-muted)}
.chevron.open{transform:rotate(180deg)}
</style>
</head>
<body>
<div id="app">
  <div id="screen-today" class="screen active"></div>
  <div id="screen-plan" class="screen"></div>
  <div id="screen-progress" class="screen"></div>
  <div id="screen-exercises" class="screen"></div>
  <div id="screen-settings" class="screen"></div>

  <nav id="nav">
    <button class="nb active" onclick="showScreen('today')" id="nb-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Today</span>
    </button>
    <button class="nb" onclick="showScreen('plan')" id="nb-plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>Plan</span>
    </button>
    <button class="nb" onclick="showScreen('progress')" id="nb-progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span>Progress</span>
    </button>
    <button class="nb" onclick="showScreen('exercises')" id="nb-exercises">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11M6.5 17.5h11M12 2v20"/><circle cx="6.5" cy="12" r="2.5"/><circle cx="17.5" cy="12" r="2.5"/></svg>
      <span>Exercises</span>
    </button>
    <button class="nb" onclick="showScreen('settings')" id="nb-settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </button>
  </nav>

  <div id="toast">
    <div class="toast-title" id="toast-title"></div>
    <div class="toast-msg" id="toast-msg"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// EXERCISE DATABASE
// ═══════════════════════════════════════════════════

const MORNING_STRETCH = [
  {id:'ms_neck',name:'Neck Rolls',reps:'30 sec each side',muscles:'Neck, Upper Trap',instructions:'Sit or stand tall. Slowly roll your head in a full circle — right, back, left, forward. Keep shoulders relaxed and movement slow.',mod:'If dizzy, do gentle side-to-side tilts only',injury:'safe',ytq:'neck rolls dynamic stretch morning'},
  {id:'ms_shoulder',name:'Shoulder Circles',reps:'10 reps each direction',muscles:'Deltoids, Rotator Cuff',instructions:'Stand tall, arms at sides. Roll both shoulders forward in large slow circles, then reverse. Keep neck relaxed.',mod:'Reduce range if shoulder is tight — smaller circles are fine',injury:'safe',ytq:'shoulder circles dynamic warm up exercise'},

const STORAGE_KEY = 'workout_app_data';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return getDefaultData();
    return Object.assign(getDefaultData(), JSON.parse(raw));
  } catch(e) { return getDefaultData(); }
}

function saveData(d) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
}

function getDefaultData() {
  return {
    startDate: null,
    currentWeight: 60,
    goalWeight: 70,
    weightLog: [],
    completedDays: {},
    longestStreak: 0,
    version: 1
  };
}

function pad2(n) { return String(n).padStart(2,'0'); }

function getTodayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

function dateToStr(d) {
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
}

function strToDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}

function isWeekend(dateStr) {
  const d = strToDate(dateStr);
  const dow = d.getDay();
  return dow === 0 || dow === 6;
}

function getPhaseInfo(startDate) {
  if (!startDate) return { phase: 1, week: 1 };
  const start = strToDate(startDate);
  const today = new Date();
  today.setHours(0,0,0,0);
  start.setHours(0,0,0,0);
  const diffMs = today - start;
  if (diffMs < 0) return { phase: 1, week: 1 };
  const diffDays = Math.floor(diffMs / 86400000);
  const week = Math.floor(diffDays / 7) + 1;
  let phase = 1;
  if (week >= 9) phase = 3;
  else if (week >= 5) phase = 2;
  return { phase, week: Math.min(week, 12) };
}

function getTodayExercises() {
  const d = loadData();
  const todayStr = getTodayStr();
  const { phase } = getPhaseInfo(d.startDate);
  const phaseKey = 'phase' + phase;
  return {
    morning: [...MORNING_STRETCH, ...SESSION_A[phaseKey]],
    evening: [...SESSION_B[phaseKey], ...NIGHT_STRETCH]
  };
}

function calculateStreak(data) {
  const todayStr = getTodayStr();
  const today = strToDate(todayStr);
  today.setHours(0,0,0,0);

  let streak = 0;

  // Check today first
  const todayWeekend = isWeekend(todayStr);
  const todayData = data.completedDays[todayStr];
  const todayDone = todayWeekend || (todayData && todayData.morning && todayData.evening);

  if (todayDone) streak = 1;

  // Go backwards from yesterday
  let cur = new Date(today);
  cur.setDate(cur.getDate() - 1);

  for (let i = 0; i < 400; i++) {
    const ds = dateToStr(cur);
    if (data.startDate && ds < data.startDate) break;
    const weekend = isWeekend(ds);
    const dd = data.completedDays[ds];
    const done = weekend || (dd && dd.morning && dd.evening);
    if (done) {
      streak++;
      cur.setDate(cur.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

function getDayStatus(dateStr, data) {
  const todayStr = getTodayStr();
  if (dateStr > todayStr) return 'future';
  if (!data.startDate || dateStr < data.startDate) return 'before';
  if (isWeekend(dateStr)) return 'rest';
  const dd = data.completedDays[dateStr];
  if (!dd) return dateStr === todayStr ? 'today' : 'missed';
  if (dd.morning && dd.evening) return 'complete';
  if (dd.morning || dd.evening) return 'partial';
  return dateStr === todayStr ? 'today' : 'missed';
}

function ytURL(query) {
  return 'https://www.youtube.com/results?search_query=' + encodeURIComponent(query);
}

function checkIcon() {
  return '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
}

function renderToday() {

    <div class="today-day">${dayName}</div>
    <div class="today-date-str">${monthName.toUpperCase()} ${pad2(todayDate.getDate())}, ${todayDate.getFullYear()}</div>

        <span class="streak-num">${streak}</span>
        <span class="streak-lbl">DAY STREAK</span>
      </div>

      <span class="badge b-teal">WEEK ${week}</span>
    </div>

    const todayIsComplete = todayDD.morning && todayDD.evening;
    html += `<div class="card rest-view">
      <div class="rest-icon">🧘</div>
      <div class="rest-title">Rest Day</div>
      <div class="rest-desc">Today is your recovery day.<br>Stretching is encouraged — training is optional.</div>
    </div>
    <div class="card">
      <div class="card-title">Optional: Morning Stretch</div>`;
    html += buildRestDayStretch('morning', todayDD);
    html += `</div>
    <div class="card">
      <div class="card-title">Optional: Night Stretch</div>`;
    html += buildRestDayStretch('evening', todayDD);
    html += `</div>`;
    if (!todayIsComplete) {
      html += `<button class="btn btn-amber" style="background:var(--amber-dim);color:var(--amber);border:1px solid rgba(245,158,11,.3);font-size:14px;font-weight:600;padding:12px;border-radius:var(--rs);cursor:pointer;width:100%;margin-bottom:8px" onclick="markRestDayComplete()">✓ Mark Rest Day Complete</button>`;
    } else {
      html += `<div class="card" style="border-color:rgba(15,217,168,.3);text-align:center;padding:16px"><span style="color:var(--teal);font-size:14px;font-weight:600">✓ Rest day complete — streak protected 🔥</span></div>`;
    }

function buildRestDayStretch(type, todayDD) {
  const checks = type === 'morning' ? (todayDD.morningChecks || {}) : (todayDD.eveningChecks || {});
  const exs = type === 'morning' ? MORNING_STRETCH : NIGHT_STRETCH;
  let html = '';
  exs.forEach(ex => {
    const chk = !!checks[ex.id];
    html += `<div class="ex-item ${chk ? 'chk' : ''}" onclick="toggleCheck('${type}','${ex.id}')">
      <div class="ex-cb">${chk ? checkIcon() : ''}</div>
      <div class="ex-info"><div class="ex-name">${ex.name}</div><div class="ex-sub">${ex.reps}</div></div>
      <a class="ex-yt" href="${ytURL(ex.ytq)}" target="_blank" onclick="event.stopPropagation()" title="Watch on YouTube">▶</a>
    </div>`;
  });
  return html;
}

function buildSessionCard(type, title, subtitle, exercises, checks, isDone) {
  const checked = exercises.filter(e => checks[e.id]).length;
  const total = exercises.length;
  const allDone = checked === total;
  let html = `<div class="session-card ${isDone ? 'done' : ''}" id="sc-${type}">
    <div class="sc-head" onclick="toggleSessionCard('${type}')">
      <div>
        <div class="sc-title">${isDone ? '✓ ' : ''}${title}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${subtitle}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="sc-prog">${checked}/${total}</span>
        <span class="chevron" id="chev-${type}">▼</span>
      </div>
    </div>
    <div class="sc-body" id="scb-${type}" style="${isDone ? 'display:none' : ''}">`;

  exercises.forEach(ex => {
    const chk = !!checks[ex.id];
    html += `<div class="ex-item ${chk ? 'chk' : ''}" onclick="toggleCheck('${type}','${ex.id}')">
      <div class="ex-cb">${chk ? checkIcon() : ''}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-sub">${ex.reps || ex.sets || ''}</div>
      </div>
      <a class="ex-yt" href="${ytURL(ex.ytq)}" target="_blank" onclick="event.stopPropagation()" title="Watch on YouTube">▶</a>
    </div>`;
  });

  html += `<div class="sc-foot">`;
  if (isDone) {
    html += `<div style="text-align:center;color:var(--teal);font-size:14px;font-weight:600;padding:4px 0">✓ Session Complete!</div>`;
  } else if (allDone) {
    html += `<button class="btn btn-teal" onclick="completeSession('${type}')">✓ Complete ${title}</button>`;
  } else {
    html += `<div style="text-align:center;color:var(--text-muted);font-size:12px;padding:4px 0">Check off all exercises to complete</div>`;
  }
  html += `</div></div></div>`;
  return html;
}

function toggleSessionCard(type) {
  const body = document.getElementById('scb-' + type);
  const chev = document.getElementById('chev-' + type);
  const hidden = body.style.display === 'none';
  body.style.display = hidden ? '' : 'none';
  if (chev) chev.classList.toggle('open', hidden);
}

function toggleCheck(type, exId) {
  const d = loadData();
  const todayStr = getTodayStr();
  if (!d.completedDays[todayStr]) {
    d.completedDays[todayStr] = { morning: false, evening: false, morningChecks: {}, eveningChecks: {} };
  }
  const checksKey = type === 'morning' ? 'morningChecks' : 'eveningChecks';
  if (!d.completedDays[todayStr][checksKey]) d.completedDays[todayStr][checksKey] = {};
  const cur = !!d.completedDays[todayStr][checksKey][exId];
  d.completedDays[todayStr][checksKey][exId] = !cur;
  saveData(d);
  renderToday();
  // re-open the section
  const body = document.getElementById('scb-' + type);
  const chev = document.getElementById('chev-' + type);
  if (body) body.style.display = '';
  if (chev) chev.classList.remove('open');
}

function completeSession(type) {
  const d = loadData();
  const todayStr = getTodayStr();
  if (!d.completedDays[todayStr]) {
    d.completedDays[todayStr] = { morning: false, evening: false, morningChecks: {}, eveningChecks: {} };
  }
  d.completedDays[todayStr][type] = true;
  const streak = calculateStreak(d);
  if (streak > (d.longestStreak || 0)) d.longestStreak = streak;
  saveData(d);
  renderToday();
  checkMilestone(streak);
  const pill = document.getElementById('streak-pill');
  if (pill) pill.classList.add('pulse');
  setTimeout(() => { if (pill) pill.classList.remove('pulse'); }, 700);
}

function markRestDayComplete() {
  const d = loadData();
  const todayStr = getTodayStr();
  if (!d.completedDays[todayStr]) {
    d.completedDays[todayStr] = { morning: false, evening: false, morningChecks: {}, eveningChecks: {} };
  }
  d.completedDays[todayStr].morning = true;
  d.completedDays[todayStr].evening = true;
  const streak = calculateStreak(d);
  if (streak > (d.longestStreak || 0)) d.longestStreak = streak;
  saveData(d);
  renderToday();
}

const MILESTONES = {
  7: { title: '7 DAY STREAK 🔥', msg: 'One full week! Consistency is your superpower.' },
  14: { title: '14 DAYS STRONG 💪', msg: 'Two weeks. Your body is adapting fast.' },
  30: { title: '30 DAY WARRIOR ⚡', msg: 'A full month of discipline. You are unstoppable.' },
  60: { title: '60 DAYS OF FIRE 🏆', msg: 'Two months in. This is who you are now.' },
  90: { title: '90 DAYS FORGED 🥇', msg: 'Ninety days. You have built something real.' },
};

let lastMilestoneShown = 0;
function checkMilestone(streak) {
  const ms = MILESTONES[streak];
  if (!ms || streak === lastMilestoneShown) return;
  lastMilestoneShown = streak;
  const toast = document.getElementById('toast');
  document.getElementById('toast-title').textContent = ms.title;
  document.getElementById('toast-msg').textContent = ms.msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4500);
}

function renderProgress() {
  const d = loadData();
  const streak = calculateStreak(d);
  const longest = d.longestStreak || streak;
  const todayStr = getTodayStr();
  const todayDate = strToDate(todayStr);

  // Weekly completion
  const monday = new Date(todayDate);
  monday.setDate(todayDate.getDate() - ((todayDate.getDay() + 6) % 7));
  let weekDone = 0, weekTotal = 0;
  for (let i = 0; i < 7; i++) {
    const dd = new Date(monday);
    dd.setDate(monday.getDate() + i);
    const ds = dateToStr(dd);
    if (ds > todayStr) break;
    if (isWeekend(ds)) { weekDone++; weekTotal++; }
    else {
      weekTotal++;
      const dayD = d.completedDays[ds];
      if (dayD && dayD.morning && dayD.evening) weekDone++;
    }

  const { phase, week } = getPhaseInfo(d.startDate);
  const wPct = Math.min(100, Math.round(((week - 1) / 12) * 100));

  const goalW = d.goalWeight || 70;
  const startW = d.weightLog.length > 0 ? d.weightLog[0].weight : (d.currentWeight || 60);
  const wProgress = startW >= goalW ? 0 : Math.max(0, Math.min(100, Math.round(((curW - startW) / (goalW - startW)) * 100)));

  let html = `<div class="screen-hdr"><div class="screen-ttl">Progress</div></div>

    <div class="stat-card">
      <div class="stat-val sv-fire">${streak}</div>

    <div class="stat-card">

      <div class="stat-lbl">🏆 Best Streak</div>
    </div>
    <div class="stat-card">
      <div class="stat-val sv-teal">${weekDone}/${weekTotal}</div>
      <div class="stat-lbl">This Week</div>
    </div>
    <div class="stat-card">
      <div class="stat-val sv-fire">${week}</div>
      <div class="stat-lbl">Week of 12</div>
    </div>
  </div>

  <div class="card">

    <div class="flex-bet" style="display:flex;justify-content:space-between;margin-bottom:6px">
      <span class="badge b-fire">PHASE ${phase} — ${phase===1?'FOUNDATION':phase===2?'BUILD':'STRENGTH'}</span>
      <span style="font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text-muted)">Week ${week}/12</span>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" style="width:${wPct}%"></div></div>

      <span style="color:var(--text-muted)">Current: <strong style="color:var(--text);font-family:'JetBrains Mono',monospace">${curW} kg</strong></span>
      <span style="color:var(--text-muted)">Goal: <strong style="color:var(--teal);font-family:'JetBrains Mono',monospace">${goalW} kg</strong></span>

function logWeight() {
  const inp = document.getElementById('weight-input');
  const val = parseFloat(inp.value);
  if (!val || val < 20 || val > 300) return;
  const d = loadData();
  const todayStr = getTodayStr();
  d.currentWeight = val;
  const existing = d.weightLog.findIndex(l => l.date === todayStr);
  if (existing >= 0) d.weightLog[existing].weight = val;
  else d.weightLog.push({ date: todayStr, weight: val });
  d.weightLog.sort((a, b) => a.date.localeCompare(b.date));
  saveData(d);
  renderProgress();
}

function renderHeatmap(data) {
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const todayStr = getTodayStr();
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const startDow = firstDay.getDay();

  let html = `<div class="heatmap-month">${MONTH_NAMES[month].toUpperCase()} ${year}</div><div class="heatmap-grid">`;
  ['S','M','T','W','T','F','S'].forEach(l => { html += `<div class="hm-lbl">${l}</div>`; });
  for (let i = 0; i < startDow; i++) html += '<div class="hm-empty"></div>';
  for (let day = 1; day <= lastDay.getDate(); day++) {
    const ds = `${year}-${pad2(month+1)}-${pad2(day)}`;
    const status = getDayStatus(ds, data);
    const isToday = ds === todayStr;
    let cls = 'hm-day';
    if (status === 'complete') cls += ' hm-complete';
    else if (status === 'rest') cls += ' hm-rest';
    else if (status === 'missed') cls += ' hm-missed';
    else if (status === 'partial') cls += ' hm-partial';
    else if (status === 'future') cls += ' hm-future';
    else cls += ' hm-future';
    if (isToday) cls += ' hm-today';
    html += `<div class="${cls}">${day}</div>`;
  }
  html += '</div>';
  return html;
}

function drawWeightChart(data) {
  const canvas = document.getElementById('weight-canvas');
  if (!canvas) return;
  const logs = data.weightLog;
  if (!logs || logs.length === 0) return;
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth;
  const H = 160;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const PAD = { t: 16, r: 20, b: 30, l: 38 };
  const goal = data.goalWeight || 70;
  const ws = logs.map(l => l.weight);
  const minW = Math.min(...ws, goal) - 1.5;
  const maxW = Math.max(...ws, goal) + 1.5;
  const xScale = i => PAD.l + (logs.length > 1 ? (i / (logs.length - 1)) : 0.5) * (W - PAD.l - PAD.r);
  const yScale = w => H - PAD.b - ((w - minW) / (maxW - minW)) * (H - PAD.t - PAD.b);

  // Background
  ctx.fillStyle = '#0D1018';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#1A2030';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = PAD.t + (i / 4) * (H - PAD.t - PAD.b);
    ctx.beginPath(); ctx.moveTo(PAD.l, y); ctx.lineTo(W - PAD.r, y); ctx.stroke();
  }

  // Goal line
  const gy = yScale(goal);
  ctx.setLineDash([5, 4]);
  ctx.strokeStyle = 'rgba(15,217,168,0.5)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(PAD.l, gy); ctx.lineTo(W - PAD.r, gy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#0FD9A8';
  ctx.font = `bold 9px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'right';
  ctx.fillText('GOAL', W - PAD.r - 2, gy - 4);

  // Gradient fill
  if (logs.length > 1) {
    const grad = ctx.createLinearGradient(0, PAD.t, 0, H - PAD.b);
    grad.addColorStop(0, 'rgba(255,85,0,0.35)');
    grad.addColorStop(1, 'rgba(255,85,0,0)');
    ctx.beginPath();
    ctx.moveTo(xScale(0), yScale(logs[0].weight));
    for (let i = 1; i < logs.length; i++) ctx.lineTo(xScale(i), yScale(logs[i].weight));
    ctx.lineTo(xScale(logs.length - 1), H - PAD.b);
    ctx.lineTo(xScale(0), H - PAD.b);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#FF5500';
  ctx.lineWidth = 2.5;
  ctx.lineJoin = 'round';
  logs.forEach((l, i) => {
    const x = xScale(i), y = yScale(l.weight);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Dots
  logs.forEach((l, i) => {
    const x = xScale(i), y = yScale(l.weight);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = '#FF5500';
    ctx.fill();
    ctx.strokeStyle = '#0D1018';
    ctx.lineWidth = 2;
    ctx.stroke();
  });

  // Latest label
  if (logs.length > 0) {
    const last = logs[logs.length - 1];
    ctx.fillStyle = '#FF5500';
    ctx.font = `bold 11px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(last.weight + 'kg', xScale(logs.length - 1), yScale(last.weight) - 10);
  }

  // Y axis labels
  ctx.fillStyle = '#5C6880';
  ctx.font = `10px 'JetBrains Mono', monospace`;
  ctx.textAlign = 'right';
  for (let i = 0; i <= 3; i++) {
    const w = minW + (maxW - minW) * (i / 3);
    ctx.fillText(w.toFixed(0), PAD.l - 4, yScale(w) + 3);
  }

  // X axis date labels
  if (logs.length >= 2) {
    const fmt = d => { const dt = strToDate(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
    ctx.fillStyle = '#5C6880';
    ctx.font = `10px 'JetBrains Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(fmt(logs[0].date), xScale(0), H - 8);
    ctx.fillText(fmt(logs[logs.length-1].date), xScale(logs.length-1), H - 8);
    if (logs.length > 3) {
      const mid = Math.floor(logs.length / 2);
      ctx.fillText(fmt(logs[mid].date), xScale(mid), H - 8);
    }
  }
}

// EXERCISES SCREEN
// ═══════════════════════════════════════════════════

let exFilter = 'all';
let exSearch = '';
let expandedEx = null;

const ALL_EXERCISES = [
  ...MORNING_STRETCH.map(e => ({...e, category: 'Stretching', phase: 0})),
  ...SESSION_A.phase1, ...SESSION_A.phase2, ...SESSION_A.phase3,
  ...SESSION_B.phase1, ...SESSION_B.phase2, ...SESSION_B.phase3,
  ...NIGHT_STRETCH.map(e => ({...e, category: 'Stretching', phase: 0})),
];

// Deduplicate by id
const UNIQUE_EXERCISES = [];
const seenIds = new Set();
ALL_EXERCISES.forEach(e => {
  if (!seenIds.has(e.id)) { seenIds.add(e.id); UNIQUE_EXERCISES.push(e); }
});

function renderExercises() {
  let html = `<div class="screen-hdr"><div class="screen-ttl">Exercise Library</div></div>
  <input class="ex-search" type="text" placeholder="Search exercises..." value="${exSearch}" oninput="setExSearch(this.value)">
  <div class="filter-tabs">
    <button class="ftab ${exFilter==='all'?'active':''}" onclick="setExFilter('all')">All</button>
    <button class="ftab ${exFilter==='Upper Body'?'active':''}" onclick="setExFilter('Upper Body')">Upper Body</button>
    <button class="ftab ${exFilter==='Lower Body'?'active':''}" onclick="setExFilter('Lower Body')">Lower Body</button>
    <button class="ftab ${exFilter==='Core'?'active':''}" onclick="setExFilter('Core')">Core</button>
    <button class="ftab ${exFilter==='Stretching'?'active':''}" onclick="setExFilter('Stretching')">Stretching</button>
  </div>`;

  const filtered = UNIQUE_EXERCISES.filter(e => {
    const matchCat = exFilter === 'all' || e.category === exFilter;
    const matchSearch = !exSearch || e.name.toLowerCase().includes(exSearch.toLowerCase()) || (e.muscles||'').toLowerCase().includes(exSearch.toLowerCase());
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    html += `<div style="text-align:center;color:var(--text-muted);padding:40px 0;font-size:14px">No exercises found</div>`;
  }

  const grouped = {};
  filtered.forEach(e => {
    const cat = e.category || 'Other';
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push(e);
  });

  const catOrder = ['Upper Body', 'Lower Body', 'Core', 'Stretching', 'Other'];
  catOrder.forEach(cat => {
    if (!grouped[cat]) return;
    html += `<div class="cat-hdr">${cat}</div>`;
    grouped[cat].forEach(ex => {
      const isOpen = expandedEx === ex.id;
      const phaseLabel = ex.phase ? `P${ex.phase}` : '';
      const phClass = ex.phase === 1 ? 'ph1' : ex.phase === 2 ? 'ph2' : ex.phase === 3 ? 'ph3' : '';
      html += `<div class="ex-ref">
        <div class="er-head" onclick="toggleExRef('${ex.id}')">
          <div class="er-name">${ex.name}</div>
          <div class="er-right">
            ${phClass ? `<div class="ph-dot ${phClass}" title="Phase ${ex.phase}"></div>` : ''}
            <span class="chevron ${isOpen ? 'open' : ''}">▼</span>
          </div>
        </div>
        <div class="er-body ${isOpen ? 'open' : ''}">
          <div class="er-instructions">${ex.instructions}</div>
          <div class="er-tags">
            <span class="er-tag">🎯 ${ex.muscles}</span>
            ${ex.phase ? `<span class="er-tag">Phase ${ex.phase}</span>` : ''}
            ${ex.sets ? `<span class="er-tag">${ex.sets}</span>` : ex.reps ? `<span class="er-tag">${ex.reps}</span>` : ''}
          </div>
          ${ex.injury ? `<div class="er-injury ${ex.injury === 'safe' ? 'inj-safe' : 'inj-caution'}">
            ${ex.injury === 'safe' ? '✓ Back & Ankle Safe' : '⚠ Use caution for back/ankle — see mod note'}
          </div>` : ''}
          ${ex.mod ? `<div style="font-size:12px;color:var(--teal);font-style:italic;margin-bottom:10px">💡 ${ex.mod}</div>` : ''}
          <a class="yt-btn" href="${ytURL(ex.ytq)}" target="_blank">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0C.488 3.45.029 5.804 0 12c.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0C23.512 20.55 23.971 18.196 24 12c-.029-6.185-.484-8.549-4.385-8.816zM9 16V8l8 3.993L9 16z"/></svg>
            Watch on YouTube
          </a>
        </div>
      </div>`;
    });
  });

  document.getElementById('screen-exercises').innerHTML = html;
}

function toggleExRef(id) {
  expandedEx = expandedEx === id ? null : id;
  renderExercises();
}

function setExFilter(f) { exFilter = f; expandedEx = null; renderExercises(); }
function setExSearch(v) { exSearch = v; expandedEx = null; renderExercises(); }

function renderSettings() {
  const d = loadData();
  const { phase, week } = getPhaseInfo(d.startDate);
  const streak = calculateStreak(d);

  let html = `<div class="screen-hdr"><div class="screen-ttl">Settings</div></div>

  <div class="set-sec">
    <div class="set-sec-ttl">Training Setup</div>
    <div class="card" style="margin-bottom:0">
      <div style="margin-bottom:12px">
        <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em">Training Start Date</label>
        <input type="date" id="start-date-inp" value="${d.startDate || ''}" style="background:var(--bg);border:1px solid var(--border-light);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;width:100%">
        <div style="font-size:11px;color:var(--text-muted);margin-top:4px">Currently: ${d.startDate ? `Week ${week}, Phase ${phase}` : 'Not set — defaulting to Phase 1'}</div>
      </div>
      <button class="btn btn-teal" onclick="saveStartDate()">Save Start Date</button>
    </div>
  </div>

  <div class="set-sec">
    <div class="set-sec-ttl">Body Weight</div>
    <div class="card" style="margin-bottom:0">
      <div style="margin-bottom:12px">
        <label style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:6px;font-weight:500;text-transform:uppercase;letter-spacing:.05em">Current Weight (kg)</label>
        <input type="number" id="cw-inp" value="${d.currentWeight || 60}" step="0.1" min="30" max="200" style="background:var(--bg);border:1px solid var(--border-light);border-radius:var(--rs);padding:10px 12px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:16px;width:100%">
      </div>
      <button class="btn btn-teal" onclick="saveCurrentWeight()">Update Weight</button>
    </div>
  </div>

  <div class="set-sec">
    <div class="set-sec-ttl">Manual Override</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-sec" onclick="manualComplete()">✓ Mark Today as Complete</button>
      <button class="btn btn-sec" onclick="manualIncomplete()">↺ Mark Today as Incomplete</button>
    </div>
  </div>

  <div class="set-sec">
    <div class="set-sec-ttl">Streak</div>
    <div class="set-row" style="margin-bottom:8px">
      <span class="set-row-lbl">Current Streak</span>
      <span class="set-row-val">🔥 ${streak} days</span>
    </div>
    <div class="set-row" style="margin-bottom:8px">
      <span class="set-row-lbl">Best Streak</span>
      <span class="set-row-val">🏆 ${d.longestStreak || streak} days</span>
    </div>
    <button class="btn btn-danger" onclick="confirmResetStreak()">Reset Streak</button>
  </div>

  <div class="set-sec">
    <div class="set-sec-ttl">Data</div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button class="btn btn-sec" onclick="exportData()">⬇ Export Progress as JSON</button>
      <button class="btn btn-danger" onclick="confirmClearAll()">⚠ Clear All Data</button>
    </div>
  </div>

  <div class="set-sec">
    <div class="set-sec-ttl">About</div>
    <div class="card">
      <div class="about-text">
        <strong style="color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.06em">FORGE</strong><br>
        Personal Calisthenics Tracker<br><br>
        <strong style="color:var(--text)">Goal:</strong> 60 kg → 70 kg lean muscle<br>
        <strong style="color:var(--text)">Schedule:</strong> Mon–Fri, 1.5h morning + 1.5h evening<br>
        <strong style="color:var(--text)">Rest days:</strong> Saturday & Sunday (auto-complete)<br>
        <strong style="color:var(--text)">Phases:</strong> Foundation (Wk 1–4) → Build (5–8) → Strength (9–12)<br><br>
        <span style="color:var(--text-dim)">All data stored locally in your browser via localStorage. No account, no server.</span>
      </div>
    </div>
  </div>`;

  document.getElementById('screen-settings').innerHTML = html;
}

function saveStartDate() {
  const inp = document.getElementById('start-date-inp');
  if (!inp || !inp.value) return;
  const d = loadData();
  d.startDate = inp.value;
  saveData(d);
  showToast('Start date saved!', 'Phase and week will auto-calculate from this date.');
  renderSettings();
}

function saveCurrentWeight() {
  const inp = document.getElementById('cw-inp');
  const val = parseFloat(inp.value);
  if (!val || val < 20 || val > 300) return;
  const d = loadData();
  d.currentWeight = val;
  const todayStr = getTodayStr();
  const existing = d.weightLog.findIndex(l => l.date === todayStr);
  if (existing >= 0) d.weightLog[existing].weight = val;
  else d.weightLog.push({ date: todayStr, weight: val });
  d.weightLog.sort((a, b) => a.date.localeCompare(b.date));
  saveData(d);
  showToast('Weight updated!', `Current weight set to ${val} kg`);
  renderSettings();
}

function manualComplete() {
  const d = loadData();
  const todayStr = getTodayStr();
  if (!d.completedDays[todayStr]) d.completedDays[todayStr] = { morning: false, evening: false, morningChecks: {}, eveningChecks: {} };
  d.completedDays[todayStr].morning = true;
  d.completedDays[todayStr].evening = true;
  const streak = calculateStreak(d);
  if (streak > (d.longestStreak || 0)) d.longestStreak = streak;
  saveData(d);
  showToast('Today marked complete!', `Streak: 🔥 ${streak} days`);
  renderSettings();
}

function manualIncomplete() {
  const d = loadData();
  const todayStr = getTodayStr();
  if (d.completedDays[todayStr]) {
    d.completedDays[todayStr].morning = false;
    d.completedDays[todayStr].evening = false;
  }
  saveData(d);
  showToast('Today reset to incomplete.', '');
  renderSettings();
}

function confirmResetStreak() {
  if (confirm('Reset streak to 0? This cannot be undone.')) {
    const d = loadData();
    // Clear completed days
    d.completedDays = {};
    saveData(d);
    showToast('Streak reset.', 'Start fresh — you got this.');
    renderSettings();
  }
}

function exportData() {
  const d = loadData();
  const json = JSON.stringify(d, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `forge-progress-${getTodayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function confirmClearAll() {
  if (confirm('Clear ALL data including streak, weight log, and completed days? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    showToast('All data cleared.', 'Fresh start.');
    renderSettings();
    renderToday();
  }
}

function showToast(title, msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-title').textContent = title;
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3200);
}

  renderToday();
  // Check if first time — auto-set start date to today if not set
  const d = loadData();
  if (!d.startDate) {

  }

init();
